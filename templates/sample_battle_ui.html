<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle UI Sample</title>
  <style>
    :root { --pixel-border:#1f2d3d; --pixel-bg:#f6f3d9; --panel-bg:#213f63; --panel-text:#fefefe; --hp-good:#4cb86b; --hp-mid:#d9b64a; --hp-low:#d45c47; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#8ed38b; font-family:"Trebuchet MS", Arial, sans-serif; padding:1rem; }
    .battle-wrap { width:min(960px, 100%); border:4px solid var(--pixel-border); box-shadow:0 10px 0 #172333; background:#b6e6a7; }
    .arena { position:relative; padding:1.3rem 1.3rem 5.8rem; min-height:420px; background:radial-gradient(circle at 20% 70%, #95d97f 0 24%, transparent 26%),radial-gradient(circle at 80% 35%, #95d97f 0 24%, transparent 26%),linear-gradient(#d4f3c9 0 50%, #9bda87 50% 100%); }
    .nameplate { position:absolute; width:290px; border:4px solid var(--pixel-border); background:var(--pixel-bg); padding:.5rem .65rem; box-shadow:0 5px 0 #27384d; }
    .nameplate.enemy { top:1rem; left:1rem; }
    .nameplate.player { right:1rem; bottom:7.7rem; }
    .name-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:.35rem; font-weight:700; letter-spacing:.02em; }
    .hp-row { display:grid; grid-template-columns:26px 1fr 56px; gap:.35rem; align-items:center; font-size:.75rem; }
    .hp-tag { font-weight:700; }
    .hp-track { height:10px; background:#2d3d4f; border:2px solid #2d3d4f; }
    .hp-fill { height:100%; width:var(--hp); background:var(--hp-good); transition:width .25s linear; }
    .hp-fill.mid { background:var(--hp-mid); }
    .hp-fill.low { background:var(--hp-low); }
    .sprite { position:absolute; width:150px; height:150px; border:4px solid #1e3551; background:repeating-linear-gradient(45deg, #f2f2f2 0 8px, #ececec 8px 16px); display:grid; place-items:center; font-weight:700; color:#334; text-transform:uppercase; box-shadow:0 6px 0 #203245; }
    .sprite.enemy { top:98px; right:220px; }
    .sprite.player { bottom:105px; left:155px; }
    .battle-panel { position:absolute; left:.95rem; right:.95rem; bottom:.95rem; border:4px solid #f8f0ca; box-shadow:0 0 0 4px #1f2d3d; background:var(--panel-bg); color:var(--panel-text); padding:.8rem; min-height:92px; display:grid; gap:.6rem; }
    .battle-msg { font-size:1.05rem; margin:0; }
    .battle-actions { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:.45rem; }
    .battle-actions button { border:2px solid #f8f0ca; background:#2d527f; color:#fff; font-weight:700; padding:.55rem; cursor:pointer; }
    .battle-actions button:hover { background:#3c679c; }
    .hint { margin-top:.9rem; color:#11314f; font-weight:700; text-align:center; }
  </style>
</head>
<body>
  <main class="battle-wrap" aria-label="Battle screen sample">
    <section class="arena">
      <article class="nameplate enemy">
        <div class="name-row"><span>WIZARD</span><span>Lv 5</span></div>
        <div class="hp-row"><span class="hp-tag">HP</span><div class="hp-track"><div class="hp-fill" style="--hp:72%;"></div></div><span>72/100</span></div>
      </article>
      <article class="nameplate player">
        <div class="name-row"><span>{{ username|default('Player') }}</span><span>Lv 6</span></div>
        <div class="hp-row"><span class="hp-tag">HP</span><div class="hp-track"><div class="hp-fill low" style="--hp:19%;"></div></div><span>19/100</span></div>
      </article>
      <div class="sprite enemy">Wizard Sprite</div>
      <div class="sprite player">Player Sprite</div>
      <section class="battle-panel" aria-live="polite">
        <p class="battle-msg">A critical hit! You dealt 25 damage.</p>
        <div class="battle-actions"><button>Attack</button><button>Items</button><button>Switch</button><button>Run</button></div>
      </section>
    </section>
  </main>
  <p class="hint">Sample only: this shows the visual direction for the real battle page.</p>
</body>
</html>
